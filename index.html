<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Estante Virtual</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar navbar-expand navbar-dark bg-dark sticky-top">
        <div class="container">
            <span class="navbar-brand mb-0 h1"> 📔 Minha Estante Virtual</span>

            <div class="navbar-nav ms-auto">
                <a class="nav-link active btn-nav" href="#" onclick="mudarTela('tela-lista')">
                    Minha Estante
                </a>

                <a class="nav-link btn-nav" href="#" onclick="mudarTela('tela-cadastro')">
                    Adicionar Livro
                </a>

                <a class="nav-link btn-nav" href="#" onclick="mudarTela('tela-estatisticas')">
                    Estatísticas
                </a>
            </div>
        </div>
    </nav>

    <div class="container my-4">

        <!-- Tela 'Lista' -->
        <section id="tela-lista" class="spa-section active-section">

            <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
                <h2>Meus Livros</h2>

                <div class="btn-group" role="group" aria-label="Filtros de leitura">
                    <button type="button" class="btn btn-outline-secondary active btn-filter"
                        onclick="filtrarLivros('todos')">
                        Todos
                    </button>

                    <button type="button" class="btn btn-outline-secondary btn-filter"
                        onclick="filtrarLivros('Estou lendo')">
                        Lendo
                    </button>

                    <button type="button" class="btn btn-outline-secondary btn-filter"
                        onclick="filtrarLivros('Concluído')">
                        Concluído
                    </button>

                    <button type="button" class="btn btn-outline-secondary btn-filter"
                        onclick="filtrarLivros('Quero ler')">
                        Quero ler
                    </button>
                </div>
            </div>

            <div id="container-livros" class="row g-4"></div>

        </section>

        <!-- Tela 'Estatísticas' -->
        <section id="tela-estatisticas" class="spa-section" style="display: none;">

            <h2 class="mb-4"> Estatísticas da Leitura</h2>

            <div class="card shadow-sm p-4">
                <h5 class="mb-3">Livros por Status</h5>

                <div style="max-width: 100%; margin: 0 auto;">
                    <canvas id="graficoStatus"></canvas>
                </div>
            </div>

            <div class="col-12">
                <div class="card shadow-sm p-4">
                    <h5 class="mb-3">Livros Concluídos por Mês</h5>

                    <div style="max-width: 100%; margin: 0 auto;">
                        <canvas id="graficoMensal"></canvas>
                    </div>
                </div>
            </div>

        </section>

        <!-- Tela 'Cadastro' -->
        <section id="tela-cadastro" class="spa-section" style="display: none;">

            <div class="card card-custom p-4 shadow-sm mx-auto"
                style="max-width: 600px; border-top: 5px solid #272a2e;">

                <h2 id="titulo-form" class="mb-4 text-center">
                    Adicionar Livro
                </h2>

                <form id="form-livro">

                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label for="titulo" class="form-label fw-semibold">
                                Título do Livro *
                            </label>

                            <input type="text" class="form-control" id="titulo" required
                                placeholder="Ex: A Cabeça do Santo">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="qtde-paginas" class="form-label fw-semibold">
                                Total de Páginas *
                            </label>

                            <input type="number" class="form-control" id="qtde-paginas" required min="1">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="genero" class="form-label fw-semibold">
                            Gênero *
                        </label>

                        <input type="text" class="form-control" id="genero" required
                            placeholder="Ex: Ficção, Romance, Fantasia...">
                    </div>

                    <div class="mb-3">
                        <label for="autor" class="form-label fw-semibold">
                            Autor / Autora *
                        </label>

                        <input type="text" class="form-control" id="autor" required placeholder="Ex: Socorro Acioli">
                    </div>

                    <div class="mb-3">
                        <label for="status" class="form-label fw-semibold">
                            Status de Leitura *
                        </label>

                        <select class="form-select" id="status" required onchange="verificarStatus()">

                            <option value="Quero ler" selected>
                                Quero ler
                            </option>

                            <option value="Estou lendo">
                                Estou lendo
                            </option>

                            <option value="Concluído">
                                Concluído
                            </option>
                        </select>
                    </div>

                    <div class="row">

                        <div id="grupo-data-inicio" class="col-md-6 mb-3" style="display: none;">

                            <label for="data-inicio" class="form-label fw-semibold text-primary">
                                Data de Início *
                            </label>

                            <input type="date" class="form-control border-primary" id="data-inicio">
                        </div>

                        <div id="grupo-pagina-atual" class="col-md-6 mb-3" style="display: none;">

                            <label for="pagina-atual" class="form-label fw-semibold text-primary">
                                Página Atual
                            </label>

                            <input type="number" class="form-control border-primary" id="pagina-atual" min="0">
                        </div>

                        <div id="grupo-data-fim" class="col-md-6 mb-3" style="display: none;">

                            <label for="data-fim" class="form-label fw-semibold text-success">
                                Data de Término *
                            </label>

                            <input type="date" class="form-control border-success" id="data-fim">
                        </div>

                    </div>

                    <div class="mb-3">
                        <label for="anotacoes" class="form-label fw-semibold">
                            Considerações / Anotações
                        </label>

                        <textarea class="form-control" id="anotacoes" rows="3"
                            placeholder="O que você está achando ou achou do livro? Seus pensamentos, citações favoritas..."></textarea>
                    </div>

                    <div id="grupo-nota" class="mb-4" style="display: none;">

                        <label class="form-label d-block fw-semibold">
                            Sua Classificação (1 a 5 estrelas)
                        </label>

                        <div class="star-rating">
                            <input type="radio" id="star5" name="avaliacao" value="5"><label for="star5">★</label>
                            <input type="radio" id="star4" name="avaliacao" value="4"><label for="star4">★</label>
                            <input type="radio" id="star3" name="avaliacao" value="3"><label for="star3">★</label>
                            <input type="radio" id="star2" name="avaliacao" value="2"><label for="star2">★</label>
                            <input type="radio" id="star1" name="avaliacao" value="1"><label for="star1">★</label>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark btn-lg">
                            Salvar na Estante
                        </button>

                        <button type="button" class="btn btn-light btn-nav" onclick="mudarTela('tela-lista')">
                            Cancelar
                        </button>
                    </div>

                </form>

            </div>

        </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>

</body>

</html>
